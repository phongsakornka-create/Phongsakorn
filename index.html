<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>AI Health System</title>

<style>

*{
box-sizing:border-box;
font-family:'Segoe UI',Arial;
}

body{
margin:0;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#7f1d1d);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
width:100%;
max-width:950px;
background:rgba(2,6,23,0.85);
backdrop-filter:blur(14px);
padding:40px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,0,0,0.7);
}

h1{
margin-bottom:30px;
font-size:30px;
background:linear-gradient(90deg,#38bdf8,#ef4444);

-webkit-background-clip:text;
-webkit-text-fill-color: transparent;   /* 🔥 เพิ่มตัวนี้ */
background-clip:text;

color:transparent;
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#3b82f6,#ef4444);
color:white;
cursor:pointer;
}

/* result */
.result-box{
margin-top:20px;
padding:20px;
border-radius:18px;
background:rgba(2,6,23,0.9);
border:1px solid rgba(255,255,255,0.08);
}

.result-container{
display:grid;
gap:15px;
}

.card{
padding:15px;
border-radius:12px;
color:white;
}

.title{background:linear-gradient(90deg,#6366f1,#8b5cf6);}
.disease{background:linear-gradient(90deg,#ef4444,#dc2626);}
.severity{background:linear-gradient(90deg,#f59e0b,#d97706);}
.cause{background:linear-gradient(90deg,#3b82f6,#1d4ed8);}
.advice{background:linear-gradient(90deg,#10b981,#059669);}
.care{background:linear-gradient(90deg,#0ea5e9,#0284c7);}
.ref{background:linear-gradient(90deg,#8b5cf6,#6d28d9);}

/* chat */
.chatbox{
margin-top:40px;
background:#020617;
padding:25px;
border-radius:15px;
}

.chat-input{
display:flex;
gap:10px;
margin-top:10px;
}

.chat-input input{
flex:1;
}

.chat-message{
margin-top:10px;
padding:10px;
border-radius:10px;
background:#0f172a;
}

.ai{border-left:4px solid red;}
.user{border-left:4px solid blue;}

#chatResult{
max-height:300px;
overflow-y:auto;
}

</style>
</head>

<body>

<div class="container">

<h1>🧠 AI Medical Diagnosis</h1>

<input id="name" placeholder="ชื่อ">
<input id="age" type="number" placeholder="อายุ">

<select id="gender">
<option value="">เพศ</option>
<option>ชาย</option>
<option>หญิง</option>
</select>

<textarea id="symptoms" placeholder="อาการ เช่น ปัสสาวะบ่อย,กระหายน้ำ"></textarea>

<button onclick="analyze()">🔍 วิเคราะห์</button>

<div id="result"></div>

<!-- CHAT -->
<div class="chatbox">

<h2>💬 AI Chat</h2>

<div id="chatResult"></div>

<div class="chat-input">
<input id="chatInput">
<button onclick="sendChat()">ส่ง</button>
</div>

</div>

</div>

<script>

let chatHistory = []
let summary = ""

// 🔗 แสดงข้อความ AI
function pushToChat(message){
let chat = document.getElementById("chatResult")

chat.innerHTML += `<div class="chat-message ai">${message}</div>`

chatHistory.push({role:"assistant",content:message})
chat.scrollTop = chat.scrollHeight
}

// 🤖 AI ต่อ
async function autoAskAI(summaryText){

let chat = document.getElementById("chatResult")

chat.innerHTML += `<div class="chat-message user">ช่วยอธิบายเพิ่มเติม</div>`

chatHistory.push({
role:"user",
content: summaryText
})

let res = await fetch("http://127.0.0.1:8000/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
message: summaryText,
history: chatHistory
})
})

let data = await res.json()

chat.innerHTML += `<div class="chat-message ai">${data.reply}</div>`

chatHistory.push({role:"assistant",content:data.reply})
chat.scrollTop = chat.scrollHeight
}

// 🔍 วิเคราะห์
async function analyze(){

let resultDiv = document.getElementById("result")

let name = document.getElementById("name").value
let age = parseInt(document.getElementById("age").value || 0)
let gender = document.getElementById("gender").value
let text = document.getElementById("symptoms").value

let symptoms = text.split(",").map(s=>s.trim()).filter(s=>s)

resultDiv.innerHTML = "⏳ กำลังวิเคราะห์..."

try{

let res = await fetch("http://127.0.0.1:8000/analyze",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({name,age,gender,symptoms})
})

let data = await res.json()

let diagnosis = data.diagnosis || "-"
let severity = data.severity || "-"
let cause = data.cause || "ไม่มีข้อมูล"
let advice = data.advice || "-"
let care = data.care || []
let refs = data.reference || []   // ✅ ใช้ reference

// care
let careList = care.length
? "<ul>"+care.map(c=>`<li>${c}</li>`).join("")+"</ul>"
: "-"

// reference
let refList = refs.length
? "<ul>"+refs.map(r=>`<li>${r}</li>`).join("")+"</ul>"
: "-"

resultDiv.innerHTML = `
<div class="result-box">
<div class="result-container">

<div class="card title">🧠 ผลวิเคราะห์</div>
<div class="card disease">🦠 โรค: ${diagnosis}</div>
<div class="card severity">⚠️ ระดับ: ${severity}</div>

<div class="card cause">
📌 สาเหตุ:
<p>${cause}</p>
</div>

<div class="card advice">
💊 คำแนะนำ:
<p>${advice}</p>
</div>

<div class="card care">
🏥 การดูแลเบื้องต้น:
${careList}
</div>

<div class="card ref">
📚 แหล่งอ้างอิง:
${refList}
</div>

</div>
</div>
`

summary = `
โรค: ${diagnosis}
ระดับ: ${severity}
คำแนะนำ: ${advice}
`

pushToChat("🧠 ผลวิเคราะห์:\n" + summary)

autoAskAI(summary)

}catch(e){
resultDiv.innerHTML = "❌ ERROR"
}

}

// 💬 chat
async function sendChat(){

let input = document.getElementById("chatInput")
let msg = input.value

if(!msg) return

let chat = document.getElementById("chatResult")

chat.innerHTML += `<div class="chat-message user">${msg}</div>`

chatHistory.push({role:"user",content:msg})

input.value=""

let res = await fetch("http://127.0.0.1:8000/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
message: msg,
history: chatHistory
})
})

let data = await res.json()

chat.innerHTML += `<div class="chat-message ai">${data.reply}</div>`

chatHistory.push({role:"assistant",content:data.reply})
chat.scrollTop = chat.scrollHeight

}

</script>

</body>
</html>
